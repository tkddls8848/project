services:
  neo4j:
    image: neo4j:5.26-community
    container_name: nara-neo4j
    ports:
      - "7474:7474"   # HTTP Browser
      - "17687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/password
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
